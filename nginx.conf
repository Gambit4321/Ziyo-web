server {
    listen 80;
    listen [::]:80;
    client_max_body_size 50M;

    server_name _;

    root /var/www/html/ziyo-web;

    location /_next/static {
        alias /var/www/html/ziyo-web/.next/static;
        expires 365d;
        access_log off;
    }

     location /uploads/ {
        root /var/www/html/ziyo-web/public;
        expires 365d;
        access_log off;
    }

    # Backward compatibility for direct image paths in public
    location /images/ {
        root /var/www/html/ziyo-web/public;
        expires 365d;
        access_log off;
    }


    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

